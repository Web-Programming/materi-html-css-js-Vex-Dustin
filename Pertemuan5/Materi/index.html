<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>CSS</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        /* Ini Internal CSS
            Selector Tag HTML */
            body{
                background-color: lightblue;
                text-align: center;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            }
            h2 {
                text-decoration: underline;
            }

            div{
                border-width: 10px;
                border-style: dotted;
                border-color: black;
            }
            .border-merah{
                border-color: red;
            }
            
            .border-biru{
                border-color: blue;
            }
            
            .border-hijau{
                border-color: green;
            }

            .border-spesial{
                border:5px solid orange;
            }
    </style>

    <link rel = "stylesheet" href="Css/gayaku.css">

</head>
<body>
    <h1 style="color: blue; font-size: 15pt;">Mengenal CSS Inline</h1>
    <h1 style="color: red; font-family: Arial, Helvetica, sans-serif, serif;"> Ini Text Berwarna Merah</h1>
    <h2>Mengenal Selector Pada CSS</h2>
    <div> 
        Halo apa kabar Kalian
    </div>
    
    <div class="border-merah"> 
        Baik
    </div>

    <div style="border-style: padding; border-color: red;">
        Kita Bahas Selector lainnya
    </div>

    <div class="border-biru border-spesial">
        Kita bahas selector lainnyaa...
    </div>

</body>
</html>
